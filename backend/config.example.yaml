server:
  host: "127.0.0.1"
  port: 8000
  cors_origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"

database:
  url: "sqlite:///./data/chemistry_lab.db"

# 所有 AI 能力统一使用 DeepSeek（仅此一家）
ai:
  provider: "deepseek"
  api_key: "sk-你的DeepSeek密钥"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  timeout_seconds: 120
  # 校园网/无法直连时填写本地代理，例如: "http://127.0.0.1:7890"
  proxy: ""

# speech 可与 ai 填相同密钥；留空时自动沿用 ai.api_key
speech:
  provider: "deepseek"
  api_key: ""
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"

storage:
  uploads_dir: "./data/uploads"
  exports_dir: "./data/exports"
